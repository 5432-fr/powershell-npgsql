name: CI (Debug)
on:
  push:
    branches:
    - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    if: github.ref != 'refs/heads/main'
    steps:

    - uses: actions/checkout@v5
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Publish
      run: dotnet publish -p:CommitHash=${{ github.sha }} -p:CommitRef=${{ github.ref_type }}/${{ github.ref_name }} -r win-x64 -c Debug --self-contained true -o .\build

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PowerShell Npgsql (Test) (${{ github.sha }})
        path: .\build\*.dll